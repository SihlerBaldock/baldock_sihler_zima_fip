<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIMA</title>
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head> 
<body>
    <header id="header">
        <img src="images/zima-logo-white.svg" id="logo-header" alt="ZIMA Logo White">

        <nav id="nav-header">
            <input type="checkbox" id="checkbox2" class="checkbox2 visuallyHidden">
            <label for="checkbox2">
                <div class="hamburger">
                    <span class="bar bar1"></span>
                    <span class="bar bar2"></span>
                    <span class="bar bar3"></span>
                    <span class="bar bar4"></span>
                </div>
            </label>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="aboutus.html">About</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero-home" class="full-width-grid-con">
        <h2 class="visually-hidden">ZIMA Hero Section</h2>
        <img
            sizes="(max-width: 1200px) 100vw, 1200px"
            srcset="
            images/zima-background412.png 412w
            images/zima-background768.png 768w"
            src="images/zima-background1200.png"
            alt="ZIMA Skinny Cans"
            class="col-span-full">
    </section>

    <section id="product-display">
        <h2>Our Products</h2>
        
        <div id="product1" class="product grid-con center-grid-con">
            <img
                sizes="(max-width: 270px) 100vw 270px"
                srcset="
                images/zima-bottle-orange176.png 176w,
                images/zima-bottle-orange232.png 232w"
                src="images/zima-bottle-orange270.png"
                alt="ZIMA Orange Bottle"
                class="col-start-2 col-end-4 m-col-start-2 m-col-end-6 l-col-start-1 l-col-end-4"
                id="zima-bottle-orange">
                  
            <button data-product="orange" data-type="ingredients" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Ingredients</button>

            <button data-product="orange" data-type="sizes" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Sizes Available</button>
            
            <button data-product="orange" data-type="info" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Flavour Information</button>   
        </div>

        <div id="product2" class="product grid-con center-grid-con">
            <img
                sizes="(max-width: 270px) 100vw 270px"
                srcset="
                images/zima-bottle-yellow176.png 176w,
                images/zima-bottle-yellow232.png 232w"
                src="images/zima-bottle-yellow270.png"
                alt="ZIMA Lemon Bottle"
                class="col-start-2 col-end-4 m-col-start-2 m-col-end-6 l-col-start-1 l-col-end-4"
                id="zima-bottle-yellow">  
                
            <button data-product="lemon" data-type="ingredients" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Ingredients</button>

            <button data-product="lemon" data-type="sizes" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Sizes Available</button>
        
            <button data-product="lemon" data-type="info" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Flavour Information</button> 
        </div>

        <div id="product3" class="product grid-con center-grid-con">
            <img
                sizes="(max-width: 270px) 100vw 270px"
                srcset="
                images/zima-bottle-green176.png 176w,
                images/zima-bottle-green232.png 232w"
                src="images/zima-bottle-green270.png"
                alt="ZIMA Lime Bottle"
                class="col-start-2 col-end-4 m-col-start-2 m-col-end-6 l-col-start-1 l-col-end-4"
                id="zima-bottle-green">  
                
            <button data-product="lime" data-type="ingredients" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Ingredients</button>

            <button data-product="lime" data-type="sizes" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Sizes Available</button>
        
            <button data-product="lime" data-type="info" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Flavour Information</button> 
        </div>

        <div id="product4" class="product grid-con center-grid-con">
            <img
                sizes="(max-width: 270px) 100vw 270px"
                srcset="
                images/zima-bottle-red176.png 176w,
                images/zima-bottle-red232.png 232w" 
                src="images/zima-bottle-red270.png"
                alt="ZIMA Graprefruit Bottle"
                class="col-start-2 col-end-4 m-col-start-2 m-col-end-6 l-col-start-1 l-col-end-4"
                id="zima-bottle-red">  
                
            <button data-product="grapefruit" data-type="ingredients" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Ingredients</button>

            <button data-product="grapefruit" data-type="sizes" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Sizes Available</button>
        
            <button data-product="grapefruit" data-type="info" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Flavour Information</button> 
        </div>

        <div id="product5" class="product grid-con center-grid-con">
            <img
                sizes="(max-width: 270px) 100vw 270px"
                srcset="
                images/zima-bottle-pink176.png 176w
                images/zima-bottle-pink232.png 232w"
                src="images/zima-bottle-pink270.png"
                alt="ZIMA Dragonfruit Bottle"
                class="col-start-2 col-end-4 m-col-start-2 m-col-end-6 l-col-start-1 l-col-end-4"
                id="zima-bottle-pink">  
                
            <button data-product="dragonfruit" data-type="ingredients" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Ingredients</button>

            <button data-product="dragonfruit" data-type="sizes" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Sizes Available</button>
        
            <button data-product="dragonfruit" data-type="info" class="products-buttons col-start-2 col-end-4 m-col-start-4 m-col-end-10 l-col-start-4 l-col-end-10">View Flavour Information</button> 
        </div>




    </section>


   

    <footer id="footer-main">
        <img src="images/zima-logo-white.svg" id="logo-footer" alt="ZIMA Logo White">
        <nav id="nav-footer">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="aboutus.html">About Us</a></li>
            </ul>
        </nav>
    </footer>

    
    <script src="js/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/velocity/1.5.2/velocity.min.js"></script>
</body>
</html>

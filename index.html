<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIMA</title>
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&family=Sora:wght@100..800&display=swap" rel="stylesheet">
</head> 
<body>
    <header id="header">
        <img src="images/zima-logo-white.svg" id="logo-header">

        <nav>
            <input type="checkbox" id="checkbox2" class="checkbox2 visuallyHidden">
            <label for="checkbox2">
                <div class="hamburger">
                    <span class="bar bar1"></span>
                    <span class="bar bar2"></span>
                    <span class="bar bar3"></span>
                    <span class="bar bar4"></span>
                </div>
            </label>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero-home" class="grid-con center-grid-con">
        <h2 class="visually-hidden">ZIMA Hero Section</h2>
        <img
            sizes="(max-width: 1200px) 100vw, 1200px"
            srcset="
            images/zima-hero382.png 382w,
            images/zima-hero608.png 608w,
            images/zima-hero970.png 970w"
            src="images/zima-background.png"
            alt="ZIMA Skinny Cans"
            class="col-start-1 col-end-5 m-col-start-2 m-col-end-12">
    </section>

    <section id="home-video" class="full-width-grid-con">
        <video autoplay muted loop playsinline class="col-span-full">
            <source src="videos/zima-video1280.mp4" type="video/mp4">
        </video>

        <div class="video-overlay">
            <h2>Our Products</h2>
            <img src="images/zima-bottle-yellow.png">

        </div>
    </section>

    
    <script src="js/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/velocity/1.5.2/velocity.min.js"></script>
</body>
</html>
